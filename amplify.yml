version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - npm ci
    build:
      commands:
        - cd frontend
        - npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: X-Frame-Options
          value: DENY
        - key: X-Content-Type-Options
          value: nosniff
        - key: X-XSS-Protection
          value: '1; mode=block'
        - key: Referrer-Policy
          value: strict-origin-when-cross-origin
    - pattern: '/assets/**'
      headers:
        - key: Cache-Control
          value: public, max-age=31536000, immutable

