services:
  - type: web
    name: alumni-connect-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput && python scripts/create_specific_test_users.py && python scripts/seed_bulk_users.py
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: alumni-connect-db
          property: connectionString
      - key: MONGODB_URI
        sync: false   # Set manually in Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # Set to your Amplify URL after deploy
      - key: FRONTEND_URL
        sync: false   # Set to your Amplify URL after deploy
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false   # Set in Render dashboard
      - key: EMAIL_HOST_PASSWORD
        sync: false   # Set in Render dashboard
      - key: CLOUDINARY_URL
        sync: false   # Set in Render dashboard
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: alumni-connect-db
    databaseName: alumni_connect
    user: alumni_connect_user
    plan: free
